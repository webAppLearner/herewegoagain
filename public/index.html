<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المهام اليومية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="notification-banner" class="hidden"></div>

    <div id="todo-view" class="container">
        <div class="app-notice">
            <span class="notice-icon">🚀</span>
            <p>
                تم إطلاق النسخة السحابية الجديدة والمطورة!
                <br>
                <a href="https://unique-to-do-website.onrender.com" target="_blank" class="ad-link">جرب الموقع الجديد من هنا</a>
            </p>
        </div>

        <h2>مهامي</h2>
        <ul id="task-list"></ul>
        <div class="input-group">
            <input type="text" id="main-input" placeholder="إضافة مهمة جديدة..." autocomplete="off">
            <button id="submit-btn">إضافة</button>
        </div>
    </div>

    <!-- تمت إضافة كلاس chat-container-wide لتوسيع الشاشة -->
    <div id="chat-view" class="container hidden chat-container-wide">
        <div id="chat-header">
            <h2>لا تنسى ان تبتسم ايه الجميل</h2>
            <span id="typing-indicator" class="hidden">شخص ما يكتب...</span>
        </div>
        <div id="chat-messages"></div>
        <div class="input-group">
            <!-- حقل إرفاق الملفات -->
            <input type="file" id="file-input" accept="image/*,video/*" class="hidden">
            <button id="attach-btn" title="إرفاق صورة أو فيديو">📎</button>
            <input type="text" id="chat-input" placeholder="اكتب رسالة..." autocomplete="off">
            <button id="send-btn">إرسال</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
