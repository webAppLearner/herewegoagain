<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المهام اليومية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="notification-banner" class="hidden"></div>

    <div id="todo-view" class="container">
        <h2>مهامي</h2>
        <div id="empty-state" class="hidden">
            <img src="https://cdn-icons-png.flaticon.com/512/10433/10433048.png" alt="بناء العادات" class="empty-image">
            <p class="empty-text">لا توجد مهام حالياً. ركز على بناء عاداتك الإيجابية!</p>
        </div>

        <ul id="task-list"></ul>
        <div class="input-group">
            <input type="text" id="main-input" placeholder="إضافة مهمة جديدة..." autocomplete="off">
            <button id="submit-btn">إضافة</button>
        </div>
    </div>

    <div id="chat-view" class="container hidden chat-container-wide">
        <div id="chat-header">
            <h2>لا تنسى ان تبتسم ايه الجميل</h2>
            <span id="typing-indicator" class="hidden">شخص ما يكتب...</span>
        </div>
        <div id="chat-messages"></div>
        <div class="input-group">
            <input type="file" id="file-input" accept="image/*,video/*" class="hidden">
            <button id="attach-btn" title="إرفاق صورة أو فيديو">📎</button>
            <input type="text" id="chat-input" placeholder="اكتب رسالة..." autocomplete="off">
            <button id="send-btn">إرسال</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
