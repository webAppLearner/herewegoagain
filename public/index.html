<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المهام اليومية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="notification-banner" class="hidden"></div>

    <div id="todo-view" class="container">
        <h2>مهامي</h2>
        <ul id="task-list"></ul>
        <div class="input-group">
            <input type="text" id="main-input" placeholder="إضافة مهمة جديدة..." autocomplete="off">
            <button id="submit-btn">إضافة</button>
        </div>

        <div class="download-section">
            <p> قريبا سيتم اضافة تطبيق للهواتف انتضرونا </p>
            <a href="/app-release.apk" class="download-btn" download>
                <span class="btn-icon">📱</span>
                <div class="btn-text">
                    <span class="btn-title">تحميل تطبيق الأندرويد</span>
                    <span class="btn-subtitle">الإصدار المستقر v1.0.0 (APK)</span>
                </div>
            </a>
        </div>
    </div>

    <div id="chat-view" class="container hidden">
        <div id="chat-header">
            <h2>فطيم الافضل</h2>
            <span id="typing-indicator" class="hidden">جاي يمسلت...</span>
        </div>
        <div id="chat-messages"></div>
        <div class="input-group">
            <input type="file" id="file-input" accept="image/*,video/*" style="display: none;">
            <button id="attach-btn">📎</button>
            <input type="text" id="chat-input" placeholder="اكتب رسالة..." autocomplete="off">
            <button id="send-btn">دز</button>
        </div>
    </div>
